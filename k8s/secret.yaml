# Never commit real values. Create with:
# kubectl create secret generic climate-secrets --from-env-file=.env -n climate-ai
#
# Or manually:
# kubectl create secret generic climate-secrets \
#   --from-literal=GROQ_API_KEY='<your-groq-key>' \
#   --from-literal=DB_ENCRYPTION_KEY='<your-32-byte-key>' \
#   --from-literal=DB_PASSWORD='<your-db-password>' \
#   --from-literal=SESSION_SECRET='<your-session-secret>' \
#   -n climate-ai
#
# This file is a SCHEMA REFERENCE ONLY.
# All stringData values below are placeholders — replace before applying,
# or (preferred) delete this file and use kubectl create secret above.
apiVersion: v1
kind: Secret
metadata:
  name: climate-secrets
  namespace: climate-ai
  labels:
    app.kubernetes.io/part-of: climsoft-web
type: Opaque
stringData:
  # Groq LLM API key — obtain from console.groq.com
  GROQ_API_KEY: "PLACEHOLDER_DO_NOT_COMMIT"

  # 32-byte AES key used by the NestJS EncryptionTransformer for email column encryption
  DB_ENCRYPTION_KEY: "PLACEHOLDER_DO_NOT_COMMIT"

  # PostgreSQL superuser password (must match POSTGRES_PASSWORD on the DB pod/service)
  DB_PASSWORD: "PLACEHOLDER_DO_NOT_COMMIT"

  # Express-session secret for signing session cookies
  SESSION_SECRET: "PLACEHOLDER_DO_NOT_COMMIT"
