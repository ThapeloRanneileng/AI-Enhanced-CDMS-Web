# Non-secret runtime configuration for all climate-ai workloads.
# Secret values (GROQ_API_KEY, DB_ENCRYPTION_KEY, DB_PASSWORD, SESSION_SECRET)
# are kept in the 'climate-secrets' Secret — see secret.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: climate-ai-config
  namespace: climate-ai
  labels:
    app.kubernetes.io/part-of: climsoft-web
data:
  # Runtime environment
  NODE_ENV: "production"

  # PostgreSQL connection (non-secret).
  # DB_HOST must match the name of your postgres Service in this namespace,
  # or an external FQDN if the database is hosted outside the cluster.
  DB_HOST: "climate-ai-postgres"
  DB_PORT: "5432"
  DB_NAME: "climsoft"
  DB_USERNAME: "postgres"

  # CORS — update to your actual public hostname before deploying.
  # Separate multiple origins with commas (backend reads ALLOWED_ORIGINS).
  ALLOWED_ORIGINS: "http://localhost,https://climate.lesotho.gov.ls"

  # GenAI / LMS pipeline settings (non-secret model configuration).
  # GROQ_API_KEY is in climate-secrets.
  LMS_GENAI_PROVIDER: "groq"
  GROQ_MODEL: "llama-3.3-70b-versatile"

  # Internal CSV-to-BUFR converter sidecar (matches docker-compose service name).
  CSV2BUFR_HOST: "climate-ai-csv2bufr"
  CSV2BUFR_PORT: "5001"
